name: Keep Supabase Alive

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
    # Every Thursday at 09:00 UTC
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping seo_settings table
        run: |
          echo "Pinging Supabase REST endpoint..."

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/seo_settings?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Cache-Control: no-cache")

          # Last line is the HTTP status code; everything before it is the body
          STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Supabase ping returned HTTP $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "Ping failed — expected 200, got $STATUS"
            echo "Response body (no secrets): $BODY"
            exit 1
          fi

          echo "Supabase is alive."
